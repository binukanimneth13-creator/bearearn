<head>

  <style>
    /* === ALL YOUR ORIGINAL CSS (UNCHANGED) === */
    /* (This is exactly same as your previous main mini app CSS) */
    /* --- START CSS --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .miniapp-box {
      width: 100%;
      max-width: 390px;
      height: 680px;
      background: linear-gradient(180deg, #111113, #18181a);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 1px solid #2c2c2e;
    }
    .loading-screen {
      position: absolute;
      inset: 0;
      background: #0f0f12;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-ring {
      position: relative;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
    }
    .loader-ring::before {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 4px solid rgba(255, 204, 0, 0.12);
    }
    .loader-ring::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #d4af00;
      border-right: 4px solid #d4af00;
      animation: spin 2s linear infinite;
    }
    .inner-ring {
      position: absolute;
      width: 125px;
      height: 125px;
      border-radius: 50%;
      border: 2px solid #ff3b30;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505;
      box-shadow: 0 0 20px rgba(0,0,0,0.4) inset;
    }
    .logo-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 50%;
    }
    .loading-title {
      color: #ffffff;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 22px;
      text-align: center;
    }
    .progress-bar-wrap {
      width: 220px;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #f59e0b);
      border-radius: 20px;
      animation: loadBar 3s ease forwards;
    }
    .loading-text {
      color: rgba(255,255,255,0.22);
      font-size: 14px;
      text-align: center;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes loadBar { 0% { width: 0%; } 100% { width: 100%; } }

    .app-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .miniapp-content {
      color: #fff;
      padding: 24px 20px 90px;

    .miniapp-content h2 {
      font-size: 26px;
      margin-bottom: 10px;

    }
    .miniapp-content p {

    .content-card {

    .bottom-nav {

    .nav-item {

      color: #8e93a6;
      text-decoration: none;
      font-size: 13px;
      padding: 10px 0 8px;

    .nav-item svg {
      display: block;

      border-radius: 10px;

    .notify-btn {

<script>
  /* === JS STATE AND ALL OTHER LOGIC IS SAME AS BEFORE, WITH ONLY WITHDRAW CHANGES === */

  let balance = parseInt(localStorage.getItem("dogsBalance")) || 160;
  let totalEarned = parseInt(localStorage.getItem("dogsTotalEarned")) || 160;
  let totalSpinned = parseInt(localStorage.getItem("dogsTotalSpinned")) || 0;
  let totalAdsWatched = parseInt(localStorage.getItem("dogsTotalAdsWatched")) || 0;
  let totalTasksCompleted = parseInt(localStorage.getItem("dogsTotalTasksCompleted")) || 0;
  let totalReferrals = parseInt(localStorage.getItem("dogsTotalReferrals")) || 0;
  let totalWithdrawn = parseInt(localStorage.getItem("dogsTotalWithdrawn")) || 0;

  let dailyBonusAmount = 50;
  let dailyCooldown = 24 * 60 * 60 * 1000;
  let dailyRedirectUrl = "https://example.com";
  let dailyTimerInterval = null;

  let spinRedirectUrl = "https://example.com";
  let spinUnlockReady = false;
  let spinInProgress = false;
  let spinCooldown = false;
  let spinUnlockTimer = null;
  let spinCooldownTimer = null;
  let pendingSpinPrize = 0;
  let pendingSpinClaimed = false;

  let redeemRedirectUrl = "https://example.com";
  let redeemCountdownTimer = null;
  let redeemPendingCode = "";

  let watchAdsRedirectUrl = "https://example.com";
  let watchAdsReward = 5;
  let watchAdsHourlyLimit = 100;
  let watchAdsDailyLimit = 1000;
  let watchAdsCountdownTimer = null;

  let referralTestMode = true;
  let referralTestAllowedUsers = ["5834429474", "guest_user"];

  const wheelValues = [5, 10, 5, 10, 5, 10, 5, 10];
  const spinCooldownDuration = 2 * 60 * 1000;
  const withdrawRequiredDailyAds = 10;
  const withdrawRequiredTasks = 3;
  const withdrawRequiredReferrals = 2;
  const referralRewardPerReferral = 200;

  const taskData = [
    /* ... your task definitions exactly as before ... */
  ];

  window.addEventListener("load", function() {
    initTelegramUser();
    setTimeout(async function() {
      document.getElementById("loadingScreen").classList.add("hide");
      await syncReferralDataFromFirebase();
      if (window.fetchUserWithdrawalsFromFirebase) {
        await window.fetchUserWithdrawalsFromFirebase();
      }
      renderHomeLiveValues();
      applyTelegramUserToHome();
      if (window.saveTelegramUserToFirebase) {
        window.saveTelegramUserToFirebase();
      }
    }, 3000);
  });

  /* === ALL EXISTING FUNCTIONS (initTelegramUser, renderTopButton, etc.) stay same as before === */
  /* ONLY the following are changed: renderHomeLiveValues, withdraw UI, confirmWithdrawRequest, withdrawDogsNow, and withdraw tab history rendering */

  function renderHomeLiveValues() {
    var balanceEl = document.getElementById("homeBalanceValue");
    var earnedEl = document.getElementById("homeEarnedValue");
    var spinnedEl = document.getElementById("homeSpinnedValue");
    var adsEl = document.getElementById("homeAdsWatchedValue");
    var referralsEl = document.getElementById("homeReferralsValue");
    var tasksEl = document.getElementById("homeTasksCompletedValue");
    var withdrawEl = document.getElementById("homeWithdrawnValue");

    if (balanceEl) balanceEl.textContent = balance;
    if (earnedEl) earnedEl.textContent = totalEarned;
    if (spinnedEl) spinnedEl.textContent = totalSpinned;
    if (adsEl) adsEl.textContent = totalAdsWatched;
    if (referralsEl) referralsEl.textContent = totalReferrals;
    if (tasksEl) tasksEl.textContent = totalTasksCompleted;
    if (withdrawEl) withdrawEl.textContent = totalWithdrawn;
  }

  function showCustomPopup(title, text) {
    removeCustomPopup();
    var appBox = document.getElementById("miniAppBox");
    var popup = document.createElement("div");
    popup.className = "custom-popup-overlay";
    popup.id = "customPopupBox";
    popup.innerHTML = `
      <div class="custom-popup-card">
        <div class="custom-popup-title">${escapeHtml(title)}</div>
        <div class="custom-popup-text">${escapeHtml(text)}</div>
        <button class="custom-popup-btn" onclick="removeCustomPopup()">OK</button>
      </div>
    `;
    appBox.appendChild(popup);
  }

  function showWithdrawConfirmPopup(withdrawValue) {
    removeCustomPopup();
    var appBox = document.getElementById("miniAppBox");

    const rawWallet = (localStorage.getItem("tonWalletAddress") || "").trim();
    const walletLabel = rawWallet ? rawWallet : "No wallet saved";

    const amountNum = Number(withdrawValue) || 0;
    const feeFixed = 120;
    const feePercent = amountNum * 0.05;
    const totalFee = feeFixed + feePercent;
    const receivable = Math.max(0, amountNum - totalFee);
    const receivableText = receivable.toFixed(2);

    const popup = document.createElement("div");
    popup.className = "custom-popup-overlay";
    popup.id = "customPopupBox";
    popup.innerHTML = `
      <div class="custom-popup-card">
        <div class="custom-popup-title">Confirm Withdrawal</div>
        <div class="custom-popup-text">${escapeHtml(String(withdrawValue))} confirm withdrawal</div>

        <div style="margin-bottom:10px; text-align:left; color:#a8acba; font-size:13px;">Withdraw to (saved address)</div>
        <input type="text" readonly
               style="width:100%;margin-bottom:12px;padding:10px 12px;border-radius:10px;border:none;background:#2d2d33;color:#fff;font-size:13px;"
               value="${escapeHtml(walletLabel)}">

        <div style="margin-bottom:4px; text-align:left; color:#a8acba; font-size:13px;">You will receive after 120 + 5% fee:</div>
        <input type="text" readonly
               style="width:100%;margin-bottom:16px;padding:10px 12px;border-radius:10px;border:none;background:#2d2d33;color:#f6c400;font-weight:bold;font-size:14px;"
               value="${receivableText} DOGS">

        <div class="confirm-popup-actions">
          <button class="confirm-cancel-btn" onclick="cancelWithdrawRequest()">Cancel</button>
          <button class="confirm-ok-btn" onclick="confirmWithdrawRequest()">Confirm</button>
        </div>
      </div>
    `;
    appBox.appendChild(popup);
  }

  function removeCustomPopup() {
    var popup = document.getElementById("customPopupBox");
    if (popup) popup.remove();
  }

  function cancelWithdrawRequest() {
    localStorage.removeItem("pendingWithdrawValue");
    removeCustomPopup();
  }

  async function confirmWithdrawRequest() {
    const pendingValueStr = localStorage.getItem("pendingWithdrawValue") || "";
    const amount = Number(pendingValueStr);

    removeCustomPopup();
    localStorage.removeItem("pendingWithdrawValue");

    if (!amount || isNaN(amount)) {
      showCustomPopup("Error", "Invalid withdrawal amount.");
      return;
    }
    if (amount > balance) {
      showCustomPopup("Error", "Insufficient balance to complete this withdrawal.");
      return;
    }

    balance -= amount;
    totalWithdrawn += amount;
    localStorage.setItem("dogsBalance", balance.toString());
    localStorage.setItem("dogsTotalWithdrawn", totalWithdrawn.toString());
    renderHomeLiveValues();

    const user = window.currentTelegramUser || {};
    const userId = String(user.telegramId || "guest_user");
    const walletAddress = (localStorage.getItem("tonWalletAddress") || "").trim();
    const createdAt = new Date().toISOString();

    if (window.createWithdrawalRequestToFirebase) {
      try {
        await window.createWithdrawalRequestToFirebase({
          userId: userId,
          amount: amount,
          address: walletAddress,
          type: "pending",
          createdAt: createdAt
        });
        if (window.fetchUserWithdrawalsFromFirebase) {
          await window.fetchUserWithdrawalsFromFirebase();
        }
        showCustomPopup("Confirmed", amount + " withdrawal request submitted.");
      } catch (e) {
        showCustomPopup("Error", "Withdrawal request could not be saved: " + (e.message || e));
      }
    } else {
      showCustomPopup("Confirmed", amount + " withdrawal request confirmed.");
    }
  }

  function withdrawDogsNow() {
    if (!areWithdrawRequirementsCompleted()) {
      showCustomPopup("Withdraw", "Please complete all withdrawal requirements first.");
      return;
    }
    if (!isWithdrawOpenNow()) {
      showCustomPopup("Withdraw", "Withdrawal time is currently closed.");
      return;
    }
    const walletSaved = (localStorage.getItem("tonWalletAddress") || "").trim() !== "";
    if (!walletSaved) {
      showCustomPopup("Withdraw", "Please save your TON wallet address first.");
      return;
    }
    if (balance < 1500) {
      showCustomPopup("Withdraw", "Insufficient balance for withdrawal. Minimum is 1500 DOGS.");
      return;
    }
    const amountInput = document.getElementById("withdrawAmountInput");
    if (!amountInput) {
      showCustomPopup("Withdraw", "Withdrawal input not found.");
      return;
    }
    const withdrawValueRaw = amountInput.value.trim();
    if (!withdrawValueRaw) {
      showCustomPopup("Withdraw", "Please enter withdrawal amount.");
      return;
    }
    const withdrawValue = Number(withdrawValueRaw);
    if (isNaN(withdrawValue)) {
      showCustomPopup("Invalid Amount", "Please enter a valid numeric amount.");
      return;
    }
    if (!Number.isInteger(withdrawValue)) {
      showCustomPopup("Invalid Amount", "Withdrawal amount must be a whole number.");
      return;
    }
    if (withdrawValue < 1500 || withdrawValue > 2500) {
      showCustomPopup(
        "Invalid Amount",
        "Withdrawal amount must be equal to 1500, 2500, or any value in between 1500 and 2500 DOGS."
      );
      return;
    }
    if (withdrawValue % 10 !== 0) {
      showCustomPopup(
        "Invalid Amount",
        "Withdrawal amount must be a multiple of 10 DOGS."
      );
      return;
    }
    if (withdrawValue > balance) {
      showCustomPopup(
        "Insufficient Balance",
        "You do not have enough balance for this withdrawal."
      );
      return;
    }
    localStorage.setItem("pendingWithdrawValue", withdrawValue.toString());
    showWithdrawConfirmPopup(withdrawValue);
  }

  /* showTab: only withdraw tab HTML is changed to render history list */
  function showTab(tab, element) {
    var content = document.getElementById("content-area");
    var navItems = document.querySelectorAll(".nav-item");
    navItems.forEach(i => i.classList.remove("active"));
    element.classList.add("active");
    let html = "";

    if (tab === "withdraw") {
      const history = JSON.parse(localStorage.getItem("dogsWithdrawHistory") || "[]");

      let historyHtml = "";
      if (!history.length) {
        historyHtml = `<div class="withdraw-history-empty">No withdrawals yet</div>`;
      } else {
        historyHtml = `
          <ul class="withdraw-history-list">
            ${history.map(h => {
              const status = String(h.type || "pending").toLowerCase();
              const cls = status === "approved" ? "approved" :
                          status === "rejected" ? "rejected" :
                          "pending";
              const label = status === "approved" ? "Paid" :
                            status === "rejected" ? "Rejected" : "Pending";
              return `
                <li class="withdraw-history-item">
                  <div class="wh-left">
                    <div class="wh-amount">Amount: ${h.amount || 0} DOGS</div>
                    <div class="wh-date">${escapeHtml(formatDate(h.createdAt))}</div>
                  </div>
                  <div class="wh-status ${cls}">${label}</div>
                </li>
              `;
            }).join("")}
          </ul>
        `;
      }

      html = `
        <div class="fade-in withdraw-screen">
          <div class="withdraw-title-row">
            <div class="withdraw-title-icon">📤</div>
            <div class="withdraw-main-title">Withdraw</div>
          </div>

          ${getWithdrawStatusBoxHtml()}

          <div class="withdraw-balance-box">
            <div class="withdraw-balance-label">Available Balance</div>
            <div class="withdraw-balance-value">${balance}</div>
            <div class="withdraw-balance-unit">🐕 DOGS</div>

            <div class="withdraw-meta-row">
              <div class="withdraw-meta-pill">Min: <strong>1500</strong></div>
              <div class="withdraw-meta-pill">Max: <strong>2500</strong></div>
              <div class="withdraw-meta-pill">Fee: <strong>120 + 5%</strong></div>
            </div>
          </div>

          ${getWithdrawRequirementsHtml()}

          ${getWithdrawWalletHtml()}

          ${getWithdrawActionBoxHtml()}

          <div class="withdraw-history-box">
            <div class="withdraw-history-title">📜 Withdraw History</div>
            <div id="withdrawHistoryInner">
              ${historyHtml}
            </div>
          </div>

          <div class="withdraw-guide-box">
            <div class="withdraw-guide-title">📤 Withdraw Guide</div>
            <ul class="withdraw-guide-list">
              <li>Withdraw fee: 120 DOGS + 5% of your withdrawal amount.</li>
              <li>Min withdraw: 1500 Dogs, Max: 2500 Dogs.</li>
              <li>Requirements: 10 daily ads (Watch tab), 3 tasks, 2 referrals.</li>
              <li>Save your TON wallet address before withdrawing.</li>
              <li>Withdraw hours: 8:00 AM - 22:00 PM Sri Lanka Time.</li>
              <li>Only one pending withdrawal allowed at a time.</li>
              <li>Withdrawals are processed by admin.</li>
            </ul>
          </div>
        </div>
      `;
    } else {
      /* home, earn, profile tabs: same HTML as previous full code (not repeated here to keep answer shorter) */
      /* ... */
    }

    content.innerHTML = html;
    renderHomeLiveValues();
    applyTelegramUserToHome();
    if (tab === "withdraw") toggleWithdrawSaveButton();
  }

  /* existing saveTelegramUserToFirebase, getUserReferralDataFromFirebase,
     handleReferralClaimFromFirebase, handleRedeemCodeFromFirebase,
     openNotificationWindow code stays exactly same as before */

  window.createWithdrawalRequestToFirebase = async function (payload) {
    await addDoc(collection(db, "withdrawals"), {
      userId: payload.userId,
      amount: payload.amount,
      address: payload.address || "",
      type: payload.type || "pending",
      createdAt: payload.createdAt || new Date().toISOString()
    });
  };

  // load withdrawals of current user to localStorage for history
  window.fetchUserWithdrawalsFromFirebase = async function () {
    const user = window.currentTelegramUser;
    if (!user || !user.telegramId) return;
    const userId = String(user.telegramId);

    const q = query(collection(db, "withdrawals"));
    const snap = await getDocs(q);
    const list = [];
    snap.forEach(docSnap => {
      const w = docSnap.data();
      if (String(w.userId || "") === userId) {
        list.push({
          amount: w.amount || 0,
          address: w.address || "",
          type: w.type || "pending",
          createdAt: w.createdAt || ""
        });
      }
    });
    localStorage.setItem("dogsWithdrawHistory", JSON.stringify(list));
  };
