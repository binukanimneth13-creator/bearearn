<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .miniapp-box {
    width: 100%;
    max-width: 390px;
    height: 680px;
    background: linear-gradient(180deg, #111113, #18181a);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    border: 1px solid #2c2c2e;
  }

  .loading-screen {
    position: absolute;
    inset: 0;
    background: #0f0f12;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  .loading-screen.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-ring {
    position: relative;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 25px;
  }

  .loader-ring::before {
    content: "";
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 4px solid rgba(255, 204, 0, 0.12);
  }

  .loader-ring::after {
    content: "";
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 4px solid transparent;
    border-top: 4px solid #d4af00;
    border-right: 4px solid #d4af00;
    animation: spin 2s linear infinite;
  }

  .inner-ring {
    position: absolute;
    width: 125px;
    height: 125px;
    border-radius: 50%;
    border: 2px solid #ff3b30;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #050505;
    box-shadow: 0 0 20px rgba(0,0,0,0.4) inset;
  }

  .logo-img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    border-radius: 50%;
  }

  .loading-title {
    color: #ffffff;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 22px;
    text-align: center;
  }

  .progress-bar-wrap {
    width: 220px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ffcc00, #f59e0b);
    border-radius: 20px;
    animation: loadBar 3s ease forwards;
  }

  .loading-text {
    color: rgba(255,255,255,0.22);
    font-size: 14px;
    text-align: center;
  }

  @keyframes spin {
    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes loadBar {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  .app-screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .miniapp-content {
    color: #fff;
    padding: 24px 20px 90px;
    height: 100%;
    overflow-y: auto;
  }

  .miniapp-content h2 {
    font-size: 26px;
    margin-bottom: 10px;
    color: #fff;
  }

  .miniapp-content p {
    color: #b4b4b8;
    font-size: 14px;
    line-height: 1.7;
  }

  .content-card {
    margin-top: 20px;
    padding: 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 78px;
    background: rgba(34, 34, 36, 0.98);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.25);
    z-index: 10;
  }

  .nav-item {
    position: relative;
    flex: 1;
    text-align: center;
    color: #8e93a6;
    text-decoration: none;
    font-size: 13px;
    padding: 10px 0 8px;
    transition: all 0.3s ease;
    background: transparent !important;
  }

  .nav-item svg {
    display: block;
    margin: 0 auto 4px;
    width: 22px;
    height: 22px;
    stroke: currentColor;
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .nav-item span {
    display: block;
    transition: all 0.3s ease;
  }

  .nav-item:hover,
  .nav-item:focus,
  .nav-item:active {
    color: #aeb4c8;
    background: transparent !important;
    outline: none;
    box-shadow: none;
  }

  .nav-item:hover svg {
    transform: translateY(-2px) scale(1.05);
    filter: drop-shadow(0 0 4px rgba(174, 180, 200, 0.15));
  }

  .nav-item.active {
    color: #f6c400;
  }

  .nav-item.active svg {
    transform: translateY(-4px) scale(1.1);
    filter: drop-shadow(0 0 6px rgba(246, 196, 0, 0.5));
  }

  .nav-item.active span {
    font-weight: bold;
  }

  .nav-item.active::before {
    content: "";
    position: absolute;
    top: 0;
    left: 25%;
    width: 50%;
    height: 3px;
    border-radius: 10px;
    background: #f6c400;
    box-shadow: 0 0 12px rgba(246, 196, 0, 0.8);
  }

  .fade-in {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .earn-list {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .earn-item {
    width: 100%;
    border: none;
    cursor: pointer;
    text-align: left;
    background: #232326;
    border-radius: 20px;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .earn-item:hover {
    background: #29292d;
  }

  .earn-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .earn-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #313137;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .earn-text strong {
    display: block;
    font-size: 16px;
    color: #fff;
    margin-bottom: 3px;
  }

  .earn-text span {
    display: block;
    font-size: 13px;
    color: #a8acba;
  }

  .earn-arrow {
    color: #9ca0af;
    font-size: 28px;
    line-height: 1;
    margin-left: 10px;
  }

  .earn-guide {
    margin-top: 18px;
    background: #232326;
    border-radius: 20px;
    padding: 18px 16px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .earn-guide-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 14px;
  }

  .earn-guide-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .earn-guide-list li {
    position: relative;
    padding-left: 16px;
    margin-bottom: 12px;
    color: #a8acba;
    font-size: 14px;
    line-height: 1.6;
  }

  .earn-guide-list li:last-child {
    margin-bottom: 0;
  }

  .earn-guide-list li::before {
    content: "";
    width: 8px;
    height: 8px;
    background: #f6c400;
    border-radius: 50%;
    position: absolute;
    left: 0;
    top: 8px;
  }

  .sub-page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .back-btn {
    border: none;
    background: #2a2a2e;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
  }

  .sub-page-title {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
  }

  .top-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
  }

  .notify-btn {
    position: relative;
    width: 42px;
    height: 42px;
    min-width: 42px;
    border: none;
    border-radius: 14px;
    background: #232326;
    color: #fff;
    cursor: pointer;
    font-size: 20px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .notify-badge {
    position: absolute;
    top: 6px;
    right: 7px;
    width: 8px;
    height: 8px;
    background: #f6c400;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(246,196,0,0.7);
  }

  .top-user-mini {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .top-user-mini-avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #f6c400;
    background: #232326;
    flex-shrink: 0;
  }

  .top-user-mini-info {
    min-width: 0;
  }

  .top-user-mini-name {
    color: #ffffff;
    font-size: 14px;
    font-weight: bold;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .top-user-mini-welcome {
    color: #b4b4b8;
    font-size: 12px;
    line-height: 1.3;
  }

  .notify-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .notify-item {
    background: #232326;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px;
    padding: 16px;
  }

  .notify-item-title {
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .notify-item-text {
    color: #a8acba;
    font-size: 14px;
    line-height: 1.6;
  }

  .notify-item-time {
    color: #8e93a6;
    font-size: 12px;
    margin-top: 8px;
  }

  .redeem-card {
    background: #232326;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.05);
    padding: 22px 16px;
    margin-top: 6px;
  }

  .redeem-icon {
    font-size: 38px;
    text-align: center;
    margin-bottom: 10px;
  }
